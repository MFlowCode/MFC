name: Convergence

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

env:
  OMPI_MCA_rmaps_base_oversubscribe: 1

jobs:
  file-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      checkall: ${{ steps.changes.outputs.checkall }}
    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: ".github/file-filter.yml"

  convergence:
    name: "Convergence"
    runs-on: ubuntu-latest
    needs: [file-changes]
    if: >-
      !cancelled() &&
      needs.file-changes.result == 'success' &&
      (needs.file-changes.outputs.checkall == 'true' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ubuntu
        run: |
          sudo apt update -y
          sudo apt install -y cmake gcc g++ python3 python3-dev \
                   openmpi-bin libopenmpi-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build MFC
        run: ./mfc.sh build -j 4

      - name: Run convergence tests
        run: ./mfc.sh test --only Convergence --no-build -j 1
